name: Bob
authors:
  - Your mom lol
website: bob.org
version: '1.2'
main: dev.leeroy.plugin.Plugin
api-version: '1.21'

dependencies:
  server:
    WorldGuard:
      load: BEFORE
      required: false
      join-classpath: true
    Vault:
      load: BEFORE
      required: false
      join-classpath: true
    TAB:
      load: BEFORE
      required: false
      join-classpath: true

permissions:
  bob.staff:
    description: Receives notifications when banned players try to join.
    default: op
  bob.heal:
    description: Allows the player to heal themselves.
    default: op
  bob.heal.others:
    description: Allows the player to heal other players.
    default: op
  bob.gamemode.self:
    description: Allows changing your own gamemode (any mode).
    default: op
    children:
      bob.gamemode.self.survival: true
      bob.gamemode.self.creative: true
      bob.gamemode.self.adventure: true
      bob.gamemode.self.spectator: true
  bob.gamemode.self.survival:
    description: Allows changing your own gamemode to Survival.
    default: op
  bob.gamemode.self.creative:
    description: Allows changing your own gamemode to Creative.
    default: op
  bob.gamemode.self.adventure:
    description: Allows changing your own gamemode to Adventure.
    default: op
  bob.gamemode.self.spectator:
    description: Allows changing your own gamemode to Spectator.
    default: op
  bob.gamemode.others:
    description: Allows changing other players gamemode (any mode).
    default: op
    children:
      bob.gamemode.others.survival: true
      bob.gamemode.others.creative: true
      bob.gamemode.others.adventure: true
      bob.gamemode.others.spectator: true
  bob.gamemode.others.survival:
    description: Allows changing other players gamemode to Survival.
    default: op
  bob.gamemode.others.creative:
    description: Allows changing other players gamemode to Creative.
    default: op
  bob.gamemode.others.adventure:
    description: Allows changing other players gamemode to Adventure.
    default: op
  bob.gamemode.others.spectator:
    description: Allows changing other players gamemode to Spectator.
    default: op
  bob.ban:
    description: Allows the player to permanently ban others.
    default: op
  bob.tempban:
    description: Allows the player to temporarily ban others.
    default: op
  bob.checkban:
    description: Allows the player to check ban info.
    default: op
  bob.unban:
    description: Allows the player to unban others.
    default: op
  bob.ipban:
    description: Allows the player to permanently IP ban others.
    default: op
  bob.iptempban:
    description: Allows the player to temporarily IP ban others.
    default: op
  bob.ipunban:
    description: Allows the player to unban IPs.
    default: op
  bob.checkipban:
    description: Allows the player to check IP ban info.
    default: op
  bob.mute:
    description: Allows the player to permanently mute others.
    default: op
  bob.tempmute:
    description: Allows the player to temporarily mute others.
    default: op
  bob.unmute:
    description: Allows the player to unmute others.
    default: op
  bob.chatmute:
    description: Allows the player to toggle server-wide chat mute.
    default: op
  bob.chatmute.bypass:
    description: Allows the player to chat even when chat is muted.
    default: op
  bob.chatclear:
    description: Allows the player to clear chat.
    default: op
  bob.kick:
    description: Allows the player to kick others.
    default: op
  bob.punish:
    description: Allows the player to use the punishment GUI.
    default: op
  bob.warn:
    description: Allows the player to warn/unwarn others.
    default: op
  bob.chatcolor:
    description: Allows the player to open the chat color GUI.
    default: true
  bob.chatcolor.white:
    description: White chat color.
    default: true
  bob.chatcolor.yellow:
    description: Yellow chat color.
    default: true
  bob.chatcolor.gold:
    description: Gold chat color.
    default: true
  bob.chatcolor.red:
    description: Red chat color.
    default: true
  bob.chatcolor.light_purple:
    description: Light purple chat color.
    default: true
  bob.chatcolor.dark_purple:
    description: Dark purple chat color.
    default: true
  bob.chatcolor.blue:
    description: Blue chat color.
    default: true
  bob.chatcolor.aqua:
    description: Aqua chat color.
    default: true
  bob.chatcolor.dark_aqua:
    description: Dark aqua chat color.
    default: true
  bob.chatcolor.green:
    description: Green chat color.
    default: true
  bob.chatcolor.dark_green:
    description: Dark green chat color.
    default: true
  bob.chatcolor.gray:
    description: Gray chat color.
    default: true
  bob.chatcolor.dark_gray:
    description: Dark gray chat color.
    default: true
  bob.chatcolor.black:
    description: Black chat color.
    default: op
  bob.chatcolor.bold:
    description: Bold chat format.
    default: true
  bob.chatcolor.italic:
    description: Italic chat format.
    default: true
  bob.chatcolor.underline:
    description: Underline chat format.
    default: true
  bob.chatcolor.rainbow:
    description: Rainbow chat color.
    default: op
  bob.glow:
    description: Allows the player to open the glow color GUI.
    default: true
  bob.glow.white:
    description: White glow color.
    default: true
  bob.glow.yellow:
    description: Yellow glow color.
    default: true
  bob.glow.gold:
    description: Gold glow color.
    default: true
  bob.glow.red:
    description: Red glow color.
    default: true
  bob.glow.light_purple:
    description: Light purple glow color.
    default: true
  bob.glow.dark_purple:
    description: Dark purple glow color.
    default: true
  bob.glow.blue:
    description: Blue glow color.
    default: true
  bob.glow.aqua:
    description: Aqua glow color.
    default: true
  bob.glow.dark_aqua:
    description: Dark aqua glow color.
    default: true
  bob.glow.green:
    description: Green glow color.
    default: true
  bob.glow.dark_green:
    description: Dark green glow color.
    default: true
  bob.glow.gray:
    description: Gray glow color.
    default: true
  bob.glow.dark_gray:
    description: Dark gray glow color.
    default: true
  bob.glow.black:
    description: Black glow color.
    default: op
  bob.glow.rainbow:
    description: Rainbow glow color.
    default: op
  bob.vanish:
    description: Allows the player to vanish.
    default: op
  bob.vanish.see:
    description: Allows the player to see vanished players.
    default: op
  bob.fly:
    description: Allows the player to use tempfly.
    default: false
  bob.fly.admin:
    description: Allows managing other players fly time.
    default: op
  bob.fly.bypass:
    description: Allows permanent fly bypass (no time drain).
    default: op
  bob.fly.bonus.member:
    description: Daily fly bonus for members.
    default: false
  bob.fly.bonus.vip:
    description: Daily fly bonus for VIPs.
    default: false
  bob.fly.bonus.mvp:
    description: Daily fly bonus for MVPs.
    default: false
  bob.chatgame:
    description: Allows managing the chat reaction game.
    default: op
  bob.combat.admin:
    description: Allows manually setting/removing combat tags.
    default: op
  bob.daily.admin:
    description: Allows resetting all daily reward cooldowns.
    default: op
  bob.report:
    description: Allows the player to report others.
    default: true
  bob.reports:
    description: Allows the player to view and manage reports.
    default: op
  bob.commandspy:
    description: Allows the player to toggle CommandSpy.
    default: op
  bob.reload:
    description: Allows the player to reload Bobs config and ban files.
    default: op
  bob.exempt:
    description: Exempts the player from all punishments.
    default: false
  bob.exempt.ban:
    description: Exempts the player from bans.
    default: false
  bob.exempt.tempban:
    description: Exempts the player from tempbans.
    default: false
  bob.exempt.mute:
    description: Exempts the player from mutes.
    default: false
  bob.exempt.tempmute:
    description: Exempts the player from tempmutes.
    default: false
  bob.exempt.kick:
    description: Exempts the player from kicks.
    default: false
  bob.exempt.ipban:
    description: Exempts the player from IP bans.
    default: false
  bob.exempt.iptempban:
    description: Exempts the player from temporary IP bans.
    default: false
  bob.tp.here:
    description: Allows the player to teleport others to themselves.
    default: op
  bob.tp.self:
    description: Allows the player to teleport themselves.
    default: op
  bob.tp.others:
    description: Allows the player to teleport other players.
    default: op
  bob.tp.coords:
    description: Allows the player to teleport to coordinates.
    default: op
  bob.tpa:
    description: Allows the player to send and receive teleport requests.
    default: true
