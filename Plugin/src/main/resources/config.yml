# Bob Plugin Configuration

# =============================================================================
# CHAT FORMAT
# Requires LuckPerms. If LuckPerms is not installed, chat appears without prefix.
#
# Placeholders:
#   {prefix}  — the LuckPerms prefix for the player's group (e.g. &4[Owner])
#   {group}   — the raw primary group name (e.g. owner, member)
#   {player}  — player display name
#   {name}    — player username
#   {message} — the chat message
# =============================================================================
chat-format:
  enabled: true
  format: "{prefix}&f {player}&7: &f{message}"

# Messages shown to players
messages:
  ban-broadcast: "&c[BAN] &e{player} &chas been permanently banned! &7Reason: {reason}"
  tempban-broadcast: "&c[TEMPBAN] &e{player} &chas been temporarily banned! &7Duration: {duration} | Reason: {reason}"
  ipban-broadcast: "&c[IP-BAN] &e{player} &chas been permanently IP banned! &7Reason: {reason}"
  iptempban-broadcast: "&c[IP-TEMPBAN] &e{player} &chas been temporarily IP banned! &7Duration: {duration} | Reason: {reason}"

# Default reasons if none are provided
defaults:
  ban-reason: "You have been banned."
  tempban-reason: "You have been temporarily banned."
  ipban-reason: "You have been IP banned."
  iptempban-reason: "You have been temporarily IP banned."

# Ban file paths (relative to plugin data folder)
storage:
  ban-file: "bans.yml"
  ipban-file: "ipbans.yml"

# Staff notification settings
staff:
  notify-on-join-attempt: true
  log-to-console: true

# Teleport settings
teleport:
  # Delay in seconds before /tpa teleport happens (0 = instant)
  tpa-delay: 3
  # Cancel teleport if player moves more than this many blocks during warmup (0 = disabled)
  tpa-cancel-on-move: 1
  # Cancel teleport if player takes damage during warmup
  tpa-cancel-on-damage: true

# ── Fly System ────────────────────────────────────────────────────────────────
fly:

  general:
    timer:
      # Timer counts down even when flight is toggled off
      constant: false
      # Timer pauses when standing on the ground
      ground: false
      # Creative mode flight also drains time
      creative: false

    flight:
      speed:
        default: 1.0
      # Maximum Y level before flight is disabled (-1 = no limit)
      max-height: -1
      # Auto re-enable flight when restrictions lift
      auto-enable: true

    time:
      # Max time in seconds a player can hold (-1 = no limit)
      max: -1

    bonus:
      # Seconds given on first ever join (0 = disabled)
      first-join: 0
      # Daily login bonus per permission group
      # Permission: bob.fly.bonus.<group>
      daily-login:
        member: 300
        vip: 600
        mvp: 1800

    combat:
      attack-player: true
      attack-mob: false
      attacked-by-player: true
      attacked-by-mob: false
      # Seconds before flight re-enables after combat
      pvp-tag: 10
      pve-tag: 5

    damage:
      on-command: false
      out-of-time: true
      combat: true

    idle:
      # Seconds before considered idle (-1 = disabled)
      threshold: 300
      drop-on-idle: false

  aesthetic:
    action-bar:
      enabled: true
      text: "&6✈ Flight&7: &f{time}"
      no-time-text: "&6✈ Flight&7: &cNo time remaining"

    warning:
      enabled: true
      title: "&cWARNING!"
      subtitle: "&fYou have &e{time} &fof flight remaining!"
      sound: "BLOCK_NOTE_BLOCK_PLING"
      thresholds:
        - 60
        - 30
        - 10
        - 5

  messages:
    prefix: "&8[&dFly&8] "
    fly-enabled: "&aFlight enabled!"
    fly-disabled: "&cFlight disabled!"
    fly-enabled-other: "&aEnabled flight for &f{player}&a."
    fly-disabled-other: "&cDisabled flight for &f{player}&c."
    no-time: "&cYou have no flight time remaining!"
    time-info: "&fYou have &e{time} &fof flight time."
    time-given: "&aYou received &e{time} &aof flight time!"
    time-given-other: "&aGave &f{player} &e{time} &aof flight time."
    time-set: "&aYour flight time was set to &e{time}&a."
    time-set-other: "&aSet &f{player}&a's flight time to &e{time}&a."
    time-removed: "&cYou lost &e{time} &cof flight time."
    time-removed-other: "&cRemoved &e{time} &cof flight time from &f{player}&c."
    daily-bonus: "&aYou received your daily flight bonus of &e{time}&a!"
    first-join: "&aWelcome! You received &e{time} &aof free flight time!"
    combat-tagged: "&cFlight disabled — you are in combat!"
    combat-untagged: "&aYou are no longer combat tagged!"
    out-of-time: "&cYou ran out of flight time!"
    idle-drop: "&cFlight disabled — you went idle!"
    no-permission: "&cYou don't have permission to do that."
    player-not-found: "&cPlayer &f{player} &cnot found."
    invalid-time: "&c'{time}' is not a valid duration. Use formats like 30m, 2h, 1d."

# ── Auto Messages ─────────────────────────────────────────────────────────────
auto-messages:
  # Interval in seconds between broadcasts
  cooldown: 300
  # Top and bottom border line
  prefix: "&8&m               &c&l FemSkyNet&8&m               &c"
  # Sound played when message broadcasts (leave empty to disable)
  sound: "ENTITY_PLAYER_LEVELUP"
  # Messages — use & for color codes, leave empty string "" to skip a message
  messages:
    - "&6Do /Buy to gain boosts!"
    - "Do /discord for updates and give aways"
    - "Do /report if you see a hacker or someone abusing their permissions as staff"
    - "Want to apply for staff? Do /apply!"

# ── Chat Games ────────────────────────────────────────────────────────────────
chat-games:
  enabled: true
  # Interval in minutes between automatic games
  interval: 5
  # Seconds before the game expires if nobody answers
  timeout: 40
  # Prefix shown in broadcasts
  announce-prefix: "&6&lFem&5S&lky&6&lNet"
  # Commands run as console when a player wins — {player} = winner name
  rewards:
    - "excellentcrates key give {player} chatgame 1"
  # Broadcast messages — supports & color codes and {word}, {player}, {time} placeholders
  messages:
    start: "&7&l| &cA chat game has started! Type &4{word} &cto gain rewards!"
    win: "&7&l| &4{player} &chas gotten &4{word} &cin &4{time}&c!"
    timeout: "&7&l| &fNo one was able to answer &4{word} &fin 40 seconds!"
  # Words used in the reaction game
  words:
    - "Creeper"
    - "Enderman"
    - "Skeleton"
    - "Blaze"
    - "Wither"
    - "Dragon"
    - "Phantom"
    - "Piglin"

# ── Combat Tag ────────────────────────────────────────────────────────────────
combat-tag:
  enabled: true
  # Seconds before combat tag expires after last hit
  duration: 20
  # Prefix for combat tag messages
  prefix: "&8[&c&lCombatTag&8] &7"
  # Commands blocked while in combat (partial match)
  blocked-commands:
    - "spawn"
    - "tpa"
    - "tpaccept"
    - "home"
    - "warp"
  # WorldGuard regions players cannot enter while in combat
  blocked-regions:
    - "spawn"
    - "safezone"
  # Whether to broadcast when a player combat-logs
  broadcast-combatlog: true
  messages:
    tagged-attacker: "&c&lCombat Tag! &7You may not use blocked commands! You hit {victim}!"
    tagged-victim: "&c&lCombat Tag! &7You may not use blocked commands! You were hit by {attacker}!"
    untagged: "&aYou are out of combat! You may now use all commands."
    combatlog: "&c{player} &7just combat logged!"
    blocked-command: "&7You may not execute that command while in combat!"
    blocked-region: "&7You may not enter that region while in combat!"
    firework-blocked: "&7You cannot use fireworks while in combat!"

# ── Daily Reward ──────────────────────────────────────────────────────────────
daily-reward:
  enabled: true
  # Hours between claims
  cooldown-hours: 24
  # Commands run as console when claimed — {player} = player name
  rewards:
    - "excellentcrates key give {player} daily 1"
  messages:
    claimed: "&eYou claimed your daily reward!"
    cooldown: "&4&lYou need to wait &e{time} &4&lbefore claiming again."
    reset-all: "&aReset all daily rewards."

# ── Full Inventory Warning ─────────────────────────────────────────────────────
full-inventory-warning:
  enabled: true
  # Cooldown in seconds between warnings
  cooldown: 3
  # Action bar message
  message: "&c&lWarning! &7Your inventory is full!"
  # Sound played with the warning (leave empty to disable)
  sound: "BLOCK_NOTE_BLOCK_PLING"

# ── Warn System ───────────────────────────────────────────────────────────────
warn:
  enabled: true
  # Max warns before auto-punishment
  max-warns: 3
  # Stacked punishments — each time a player hits max warns, the next entry is used.
  # The last entry repeats for all subsequent offenses. {player} = player name.
  stacked-punishments:
    - "tempban {player} 1d Too many warnings! (Offense 1)"
    - "tempban {player} 7d Too many warnings! (Offense 2)"
    - "tempban {player} 14d Too many warnings! (Offense 3)"
    - "tempban {player} 30d Too many warnings! (Offense 4+)"
  # Reset warns after auto-punishment
  reset-on-max: true
  messages:
    warned-broadcast: "&c{player} &7HAS BEEN &4&lWARNED &r&7BY &c{staff} &7for &r{reason} &8(&4{warns}&8/&4{max}&8)"
    warned-broadcast-no-reason: "&c{player} &7HAS BEEN &4&lWARNED &r&7BY &c{staff} &8(&4{warns}&8/&4{max}&8)"
    unwarned-broadcast: "&a{player} &7HAS BEEN &2&lUN-WARNED &r&7BY &a{staff}&r! &8(&2{warns}&8/&2{max}&8)"
    no-warns: "&4{player} &chas no warns."
    check-self: "&cYou have &4{warns}&8/&4{max} &cwarns."
    check-other: "&4{player} &chas &4{warns}&8/&4{max} &cwarns."
    # Personal message sent to the warned player.
    # {punishment} = readable punishment e.g. "tempbanned for 1d", {offense} = offense number
    personal-warn: "&7You now have &4{warns}&8/&4{max} &7warnings. &cYou will be &4{punishment} &cif you get too many warnings &8(Offense &4{offense}&8)"
    personal-warn-max: "&cYou have reached &4{max}&c warnings and will be punished!"