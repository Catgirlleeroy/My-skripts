name: Bob
author: Bob
website: bob.org
version: '1.0'
main: dev.leeroy.plugin.Plugin
api-version: '1.21'

commands:
  heal:
    description: Heals a player to full HP, hunger, and saturation.
    usage: /heal [player]
    permission: healplugin.heal
  gm0:
    description: Sets gamemode to Survival.
    usage: /gm0 [player]
    permission: gamemodes.self
  gm1:
    description: Sets gamemode to Creative.
    usage: /gm1 [player]
    permission: gamemodes.self
  gm2:
    description: Sets gamemode to Adventure.
    usage: /gm2 [player]
    permission: gamemodes.self
  gm3:
    description: Sets gamemode to Spectator.
    usage: /gm3 [player]
    permission: gamemodes.self
  ban:
    description: Permanently bans a player.
    usage: /ban <player> [reason]
    permission: bansystem.ban
  tempban:
    description: Temporarily bans a player.
    usage: /tempban <player> <duration> [reason]
    permission: bansystem.tempban
  checkban:
    description: Checks the ban status of a player.
    usage: /checkban <player>
    permission: bansystem.checkban

permissions:
  healplugin.heal:
    description: Allows the player to heal themselves.
    default: op
  healplugin.heal.others:
    description: Allows the player to heal other players.
    default: op
  gamemodes.self:
    description: Allows the player to change their own gamemode.
    default: op
  gamemodes.others:
    description: Allows the player to change other players' gamemode.
    default: op
  bansystem.ban:
    description: Allows the player to permanently ban others.
    default: op
  bansystem.tempban:
    description: Allows the player to temporarily ban others.
    default: op
  bansystem.checkban:
    description: Allows the player to check ban info.
    default: op