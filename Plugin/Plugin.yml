name: Bob
author: Bob
website: bob.org
version: '1.0'
main: dev.leeroy.plugin.Plugin
api-version: '1.21'

commands:
  heal:
    description: Heals a player to full HP, hunger, and saturation.
    usage: /heal [player]
    permission: healplugin.heal
  ban:
    description: Bans a player from the server.
    usage: /ban <player> [reason]
    permission: bobplugin.ban
  unban:
    description: Unbans a player.
    usage: /unban <player>
    permission: bobplugin.ban
  checkban:
    description: Checks the ban record of a player.
    usage: /checkban <player>
    permission: bobplugin.checkban
permissions:
  healplugin.heal:
    description: Allows the player to heal themselves.
    default: op
  healplugin.heal.others:
    description: Allows the player to heal other players.
    default: op
  bobplugin.ban:
    description: Allows banning and unbanning players.
    default: op
  bobplugin.checkban:
    description: Allows checking ban records.
    default: op